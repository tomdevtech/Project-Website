name: Update Projects

on:
  schedule:
    - cron: "0 2 * * *"  # Jeden Tag um 02:00 Uhr
  workflow_dispatch:      # Manuell auslösbar (z.B. zum Testen)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prüfe auf neue Repos & aktualisiere Dateien
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/update-projects.mjs
          if git diff --quiet src/translations/translations.ts src/components/ContentFrameBox.tsx; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push (nur bei Änderungen)
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/translations/translations.ts src/components/ContentFrameBox.tsx
          git commit -m "feat: neue Projekte automatisch hinzugefügt [skip ci]"
          git push
