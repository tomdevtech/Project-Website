name: Update Projects

on:
  schedule:
    - cron: "*/30 * * * *"  # Alle 30 Minuten prüfen
  workflow_dispatch:         # Manuell auslösbar zum Testen

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dependencies installieren
        run: npm ci

      - name: Prüfe auf neue Repos & aktualisiere Dateien
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/update-projects.mjs
          if git diff --quiet src/translations/translations.ts src/components/ContentFrameBox.tsx; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit geänderte Quelldateien
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/translations/translations.ts src/components/ContentFrameBox.tsx
          git commit -m "feat: neue Projekte automatisch hinzugefügt [skip ci]"
          git push

      - name: Website bauen
        if: steps.update.outputs.changed == 'true'
        run: npm run build

      - name: GitHub Pages vorbereiten
        if: steps.update.outputs.changed == 'true'
        uses: actions/configure-pages@v4

      - name: dist/ hochladen
        if: steps.update.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Auf GitHub Pages deployen
        if: steps.update.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
